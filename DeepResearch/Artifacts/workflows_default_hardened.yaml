## Rework Escalation Rules

```yaml
Rework Escalation Matrix:

Failure Point | Severity | Max Iterations | Escalation Path
-----|----------|-----------|----------------------
CLARIFY | User can't articulate intent | 2 | Human domain expert
SPECIFY | Spec has stack-specific terms | 1 | Architect decides on boundary
ARCHITECT | Design is unimplementable | 1 | Spec Author (requirements unclear)
PLAN | Tasks are untestable | 1 | Architect (design too complex)
IMPLEMENT | AC fails, but fixable | 2 | Planner (if > 2 iterations)
REVIEW | Code violates spec | 1 (critical) | Planner (redesign needed)
TEST | Many tests fail | 2 | Architect (design flaw)
```

