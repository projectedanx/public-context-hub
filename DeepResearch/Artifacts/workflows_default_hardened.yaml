## Workflow Diagram (Mermaid)

```mermaid
graph LR
    START["Start: User Intent"]
    CLARIFY_NODE["Stage A: Clarify"]
    SPECIFY_NODE["Stage B: Specify"]
    ARCHITECT_NODE["Stage C: Architect"]
    PLAN_NODE["Stage D: Plan"]
    IMPLEMENT_NODE["Stage E: Implement"]
    REVIEW_NODE["Stage F: Review"]
    TEST_NODE["Stage G: Test"]
    COMPLETE_NODE["Stage H: Complete"]
    
    START --> CLARIFY_NODE
    CLARIFY_NODE -->|Confidence >= 7| SPECIFY_NODE
    CLARIFY_NODE -->|Confidence < 7| CLARIFY_NODE
    
    SPECIFY_NODE -->|No stack terms| ARCHITECT_NODE
    SPECIFY_NODE -->|Has stack terms| SPECIFY_NODE
    
    ARCHITECT_NODE --> PLAN_NODE
    
    PLAN_NODE -->|Testable criteria| IMPLEMENT_NODE
    PLAN_NODE -->|Untestable| PLAN_NODE
    
    IMPLEMENT_NODE -->|All AC pass| REVIEW_NODE
    IMPLEMENT_NODE -->|Some AC fail| IMPLEMENT_NODE
    
    REVIEW_NODE -->|APPROVED| TEST_NODE
    REVIEW_NODE -->|REJECTED_MINOR| IMPLEMENT_NODE
    REVIEW_NODE -->|REJECTED_MAJOR| IMPLEMENT_NODE
    REVIEW_NODE -->|REJECTED_CRITICAL| PLAN_NODE
    
    TEST_NODE -->|All pass, Coverage > 80%| COMPLETE_NODE
    TEST_NODE -->|Some fail| IMPLEMENT_NODE
    TEST_NODE -->|Many fail| ARCHITECT_NODE
    
    COMPLETE_NODE --> END["End: Ready for Deployment"]
```

---

## Router Integration

The **Router** monitors all stage transitions:

```yaml
Router Function:
  - Read current artifact state (docs/, code/)
  - Determine current stage
  - Apply routing logic
  - Output next_persona + missing_inputs
  
Router Location in Workflow:
  - Between each stage transition
  - Checks if prerequisites are met before advancing
  - Detects rework scenarios and re-routes to appropriate persona
```

---

## Configuration Options

```yaml
# These can be tuned based on project complexity:

defaults:
  clarify_max_iterations: 2
  specify_max_iterations: 1
  plan_max_iterations: 1
  implement_max_iterations_minor: 2
  implement_max_iterations_major: 1
  review_max_iterations: 1
  test_max_iterations: 2
  
  acceptance_criteria_strictness: "EXECUTABLE" # or "SUBJECTIVE"
  coverage_threshold: 0.80
  
  escalation_on_uncertainty: true
```

---

## Success Metrics

Project is considered successful when:

```yaml
Criteria:
  - All 8 stages completed
  - No stage reverted more than max_iterations times
  - Code review: APPROVED (or APPROVED_WITH_SUGGESTIONS)
  - Test report: ALL_PASSED
  - Test coverage: >= 80%
  - Specification: Zero tech-stack-specific terms
  - Implementation: Zero TODO comments
  - Timeline: Completed without blocking escalations (escalations okay)
```
